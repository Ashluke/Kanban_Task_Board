<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Board</title>
    <link rel="stylesheet" href="/static/src/style.css">
    <script src="/static/dist/index.js" defer></script>
</head>
<body>
    <div class="container">
        <div class="to-do" id="to-do" data-status="todo">
            <div class="header-container">
                <h3>TO-DO</h3>
            </div>
            <div class="task-zone">

            </div>
        </div>
        <div class="in-progress" id="in-progress" data-status="progress">
            <div class="header-container">
                <h3>IN PROGRESS</h3>
            </div>
            <div class="task-zone">

            </div>
        </div>
        <div class="done" id="done" data-status="done">
            <div class="header-container">
                <h3>FINISHED</h3>
            </div>
            <div class="task-zone">

            </div>
        </div>
    </div>
    <div class="button-container">
        <button id="add-button">Add Tasks</button>
    </div>
    <div class="header-container">
            <h3>TRASH BIN</h3>
            <button id="delete-button">Empty Trash</button>
        </div>
        <div class="trash-bin" id="trash-bin" data-status="trash">
            <div class="task-zone">
                <p class="trash-hint">Drop tasks here to delete</p>
            </div>
        </div>
</body>
</html>
